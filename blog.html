<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Diogenes Analytics | Blog</title>
    <link rel="stylesheet" type="text/css" href="styles/css/MyFontsWebfontsKit.css">
    <link href="styles/css/base.css" rel="stylesheet">
    <style>
      .bandeau{
        grid-column: 2/span 13;
        border-bottom: black 1px solid;
        text-align: right;
      }

      #name{
        display: inline-block;
        float: left;
      }

      #year{
        display: inline-block;
      }

      .content-scroll{
        grid-column: 2/span 13;
        height: 70vh;
        overflow-x: auto;
      }

      .projet{
        width: 100%;
        height: 50px;
        text-align: right;
        border-bottom: solid 1px black;
        display: table;
      }

      .projet a{
       display: table-cell;
       vertical-align: middle;
      }

      .projet h2:first-child{
        float: left;
      }

      .projet:hover h2{
        font-style: italic;
        color: red;
      }

      @media screen and (max-width: 900px) {
        .footer-left{
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
          <p><a href="index.html">Diogenes Analytics</a></p>
          <p><a href="blog.html">Blog</a></p>
          <p><a href="about.html">Information</a></p>
        </header>
    <div class="bandeau">
      <div id="name"><p>Articles<p></div>
      <div id="annee"><p>Year<p></div>
    </div>

    <ul class="content-scroll">
      <!-- A LIST ITEM TEMPLATE -->
      <!-- <li class="tooltip projet">
        <a href="articles/YOUR_ARTICLE.html">
          <h2>YOUR ARTICLE TITLE</h2>
          <h2>2022</h2>
        </a>
      </li> -->
    </ul>
    <div class="footer">
    	<div class="footer-left">
    		<p>All rights reserved © 2021 - <span id="year"></span></p>
    	</div>
    	<div class="footer-right">
    	</div>
    </div>
  </body>
  <script>
    // get new date object
    var dt = new Date();
    // update copyright range to most recent year
    document.getElementById('year').innerHTML = dt.getFullYear();
  </script>
</html>
